services:
  - type: web
    name: music-player-backend
    env: python
    plan: free  # Можно изменить на standard для лучшей производительности
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
      - key: FLASK_ENV
        value: production
      # Остальные переменные (SUPABASE_URL, SUPABASE_KEY) добавить в Render Dashboard
